name: Build content

on:
  push:
    branches: [main]
    paths:
      - content.ko.json
      - content.en.json
      - template.html
      - build.js

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build index.html
        run: node build.js

      - name: Commit generated index.html
        run: |
          if git diff --quiet index.html; then
            echo "No changes to index.html"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: index.html 자동 빌드"
          git push
